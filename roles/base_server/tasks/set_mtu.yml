- name: Set mtu in /etc/network/interfaces
  lineinfile:
    path: /etc/network/interfaces
    regex: 'mtu'
    line: "\tmtu {{ sdn_mtu }}"
    state: present
  #notify: restart networking

# container interface is usually eth0, vm interface is usually ens18
- name: Debug hostvars
  debug:
    #msg: "{{ hostvars }}"
    #var: hostvars[inventory_hostname]
    msg: "device to set mtu: {{ ansible_facts['eth0']['device'] | default('undefined') }}"

- name: Reset mtu to desired value on running system (container)
  command: "ip link set {{ ansible_facts['eth0']['device'] }} mtu {{ sdn_mtu }}"
  when: ansible_facts['eth0'] is defined and ansible_facts['eth0']['device'] is defined

- name: Reset mtu to desired value on running system (vm)
  command: "ip link set {{ ansible_facts['ens18']['device'] }} mtu {{ sdn_mtu }}"
  when: ansible_facts['ens18'] is defined and ansible_facts['ens18']['device'] is defined

