---
- name: Install dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - jq
      - acl            # required for ansible to become unpriv'd user to run tasks successfully
    state: present
    update_cache: true

- name: Ensure /etc/apt/keyrings dir exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Add docker signing key to apt keyring securely
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: true
    checksum: "sha256:1500c1f56fa9e26b9b8f42452a553675796ade0807cdce11975eb98170b3a570"

- name: Add docker repository to apt
  ansible.builtin.apt_repository:
    filename: docker
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
    state: present
    update_cache: true

- name: Install docker engine
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

# as of Docker version 23.0.0, build e92dd87 /etc/docker is no longer created by installing the debian package
- name: Ensure /etc/docker exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure docker daemon
  ansible.builtin.template:
    src: docker_daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify: restart docker

- name: Add admin users to docker group
  ansible.builtin.user:
    name: "{{ item.username }}"
    groups: docker
    append: yes
  loop: "{{ admin_users }}"
